## Training configuration for "hey claw" wake word model
## Used with openWakeWord's train.py automated training pipeline

model_name: "hey_claw"

target_phrase:
  - "hey claw"

# Phrases that should NOT trigger the model (reduce false positives)
custom_negative_phrases:
  - "hey claude"
  - "hey clock"
  - "hey class"
  - "hey clown"
  - "hey cloud"
  - "hey call"
  - "the claw"
  - "hey y'all"

# Number of synthetic samples to generate
n_samples: 50000
n_samples_val: 5000

# TTS batch size for synthetic generation
tts_batch_size: 50

# Augmentation settings
augmentation_batch_size: 16
augmentation_rounds: 2

# Piper TTS path (cloned during setup)
piper_sample_generator_path: "./piper-sample-generator"

# Output directory
output_dir: "./output/hey_claw"

# Room impulse responses for augmentation
rir_paths:
  - "./data/mit_rirs"

# Background noise for augmentation
# AudioSet may be unavailable (404); FMA is the primary source
background_paths:
  - "./data/fma"

background_paths_duplication_rate:
  - 1

# Pre-computed features for false-positive validation (~11 hours)
false_positive_validation_data_path: "./data/validation_set_features.npy"

# Pre-computed negative features (~2000 hours from ACAV100M)
feature_data_files:
  "ACAV100M": "./data/openwakeword_features_ACAV100M_2000_hrs_16bit.npy"

# Batch composition
batch_n_per_class:
  "ACAV100M": 1024
  "adversarial_negative": 50
  "positive": 50

# Model architecture
model_type: "dnn"
layer_size: 32

# Training parameters
steps: 50000
max_negative_weight: 1500
target_false_positives_per_hour: 0.2
